<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="screen active" id="start-screen">
            <h1>Quix Time!</h1>
            <p>Test your knowledge with these fun questions</p>
            <button>Start Quiz</button>
        </div>

        <div class="screen" id="quiz-screen">
            <div class="quiz-header">
                <h2 id="question-text">Question Goes Here</h2>
                <div class="quiz-info">
                    <p>
                        Question <span id="current-question">1</span> of <span id="total-questions">5</span>
                    </p>
                    <p>
                        Score: <span id="scroe">0</span>
                    </p>
                </div>
            </div>
            <div class="answers-container" id="answers-container">
                <!-- Answer Buttons here -->
            </div>

            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
        </div>
        <div class="screen" id="result-screen">
            <h1>Quiz Results</h1>
            <div class="result-info">
                <p>You Scored <span id="final-score"> 0 </span> Out of <span id="max-score"> 5 </span></p>
            <div class="" id="result-message">Good Job!</div>
            </div>
            <button id="restart-btn">Restart Button</button>
        </div>
    </div>
</body>
</html>
